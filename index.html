<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnemiaAI Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0f2027;
    --text: white;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: var(--text);
    transition: 0.3s;
}

/* LIGHT MODE */
.light {
    background: #f5f5f5;
    color: black;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.btn {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    margin: 10px;
    background: #00d4ff;
    cursor: pointer;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
}

/* GRAPH */
.bar {
    background: #00d4ff;
    height: 20px;
    margin: 10px 0;
}

/* VIDEO */
iframe {
    width: 80%;
    height: 400px;
    border-radius: 10px;
}

/* TOGGLE */
.toggle {
    position: fixed;
    top: 20px;
    right: 20px;
}
</style>
</head>

<body>

<button class="btn toggle" onclick="toggleMode()">🌗 Toggle</button>

<div class="hero">
<h1>🩸 AnemiaAI Pro</h1>
<p>AI-powered anemia detection system</p>

<button class="btn" onclick="window.open('https://github.com/Princerathore27/anemia-ai-pro')">GitHub</button>
<button class="btn" onclick="window.open('https://github.com/Princerathore27/anemia-ai-pro/archive/refs/heads/master.zip')">Download</button>
</div>

<!-- GRAPH -->
<div class="grid">
<div class="card">
<h3>📊 Accuracy</h3>
<p>VGG16 (100%)</p>
<div class="bar" style="width:100%"></div>

<p>DenseNet (99%)</p>
<div class="bar" style="width:99%"></div>

<p>Inception (96%)</p>
<div class="bar" style="width:96%"></div>
</div>
</div>

<!-- FEATURES -->
<div class="grid">
<div class="card">🤖 AI Models</div>
<div class="card">💻 GUI App</div>
<div class="card">⚡ CLI Tool</div>
<div class="card">🔄 CI/CD</div>
</div>

<!-- VIDEO -->
<div class="grid">
<div class="card">
<h3>🎥 Demo Video</h3>
<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
</div>
</div>

<!-- RUN -->
<div class="grid">
<div class="card">
<h3>⚙️ Run Locally</h3>
<pre>pip install -r requirements.txt</pre>
<pre>python anemia_app_pro.py</pre>
</div>
</div>

<script>
function toggleMode() {
    document.body.classList.toggle("light");
}
</script>

</body>
</html>
